# Run Giti from prebuilt GHCR images (no local build).
#   cp .env.example .env  &&  docker compose -f docker-compose.ghcr.yml up -d
# Override the image owner/tag with GHCR_OWNER and GITI_TAG in .env if needed.
name: giti

services:
  traefik:
    image: traefik:v3.4
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-gateway:${GITI_TAG:-latest}
    environment:
      GITI_WMS_URL: http://wms:8080
      GITI_WFS_URL: http://wfs:8080
      GITI_TILES_URL: http://tiles:8080
      GITI_WPS_URL: http://wps:8080
      GITI_AUTH_URL: http://auth:8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway.rule=PathPrefix(`/giti`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`)
      - traefik.http.routers.gateway.priority=2
      - traefik.http.services.gateway.loadbalancer.server.port=8080
      - traefik.http.services.gateway.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.gateway.loadbalancer.healthcheck.interval=5s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }

  wms:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-wms:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
    volumes:
      - gitidata:/var/lib/giti/data:ro
    depends_on:
      postgres: { condition: service_healthy }

  catalog:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-catalog:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
      GITI_NATS_URL: nats://nats:4222
    volumes:
      - gitidata:/var/lib/giti/data:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.catalog.rule=PathPrefix(`/giti/rest`) || PathPrefix(`/api/v1`)
      - traefik.http.routers.catalog.priority=10
      - traefik.http.services.catalog.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  auth:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-auth:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
      GITI_REDIS_URL: redis:6379
      GITI_JWT_SECRET: ${GITI_JWT_SECRET:-giti-dev-secret}
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=PathPrefix(`/giti/rest/security`) || PathPrefix(`/giti/rest/geofence`) || PathPrefix(`/api/v1/auth`)
      - traefik.http.routers.auth.priority=20
      - traefik.http.services.auth.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  wfs:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-wfs:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
    volumes:
      - gitidata:/var/lib/giti/data:ro
    depends_on:
      postgres: { condition: service_healthy }

  tiles:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-tiles:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
      GITI_REDIS_URL: redis:6379
      GITI_NATS_URL: nats://nats:4222
      GITI_WMS_URL: http://wms:8080
      GITI_TILE_CACHE_DIR: /var/cache/giti/tiles
    volumes:
      - tilecache:/var/cache/giti/tiles
    labels:
      - traefik.enable=true
      - traefik.http.routers.tiles.rule=PathPrefix(`/tiles`)
      - traefik.http.routers.tiles.priority=5
      - traefik.http.services.tiles.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }

  wps:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-wps:${GITI_TAG:-latest}
    environment:
      GITI_DATABASE_URL: postgres://${POSTGRES_USER:-giti}:${POSTGRES_PASSWORD:-giti-dev-password}@postgres:5432/${POSTGRES_DB:-giti}
      GITI_NATS_URL: nats://nats:4222
      GITI_WPS_RESULTS_DIR: /var/lib/giti/wps
    volumes:
      - wpsresults:/var/lib/giti/wps
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  convert:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-convert:${GITI_TAG:-latest}
    environment:
      GITI_CATALOG_URL: http://catalog:8080
      GITI_DATA_DIR: /var/lib/giti/data
    volumes:
      - gitidata:/var/lib/giti/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.convert.rule=PathPrefix(`/api/v1/convert`)
      - traefik.http.routers.convert.priority=15
      - traefik.http.services.convert.loadbalancer.server.port=8080
    depends_on:
      catalog: { condition: service_started }

  frontend:
    image: ghcr.io/${GHCR_OWNER:-itsmadson}/giti-frontend:${GITI_TAG:-latest}
    environment:
      NEXT_PUBLIC_API_BASE: ""
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=8080
    depends_on:
      gateway: { condition: service_started }

  postgres:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-giti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-giti-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-giti}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-giti}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-giti-dev-password}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  miniodata:
  tilecache:
  wpsresults:
  gitidata:
