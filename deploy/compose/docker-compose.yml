name: geoson

services:
  traefik:
    image: traefik:v3.4
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_WMS_URL: http://wms:8080
      GEOSON_WFS_URL: http://wfs:8080
      GEOSON_TILES_URL: http://tiles:8080
      GEOSON_WPS_URL: http://wps:8080
      GEOSON_AUTH_URL: http://auth:8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway.rule=PathPrefix(`/geoserver`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`)
      - traefik.http.routers.gateway.priority=1
      - traefik.http.services.gateway.loadbalancer.server.port=8080
      - traefik.http.services.gateway.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.gateway.loadbalancer.healthcheck.interval=5s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }

  wms:
    build:
      context: ../..
      dockerfile: services/wms/Dockerfile
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
    # internal only — gateway talks to it via service DNS (http://wms:8080)
    depends_on:
      postgres: { condition: service_healthy }

  catalog:
    build:
      context: ../..
      dockerfile: services/catalog/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
      GEOSON_NATS_URL: nats://nats:4222
    volumes:
      - geosondata:/var/lib/geoson/data:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.catalog.rule=PathPrefix(`/geoserver/rest`) || PathPrefix(`/api/v1`)
      - traefik.http.routers.catalog.priority=10
      - traefik.http.services.catalog.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
      GEOSON_REDIS_URL: redis:6379
      GEOSON_JWT_SECRET: ${GEOSON_JWT_SECRET:-geoson-dev-secret}
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=PathPrefix(`/geoserver/rest/security`) || PathPrefix(`/geoserver/rest/geofence`) || PathPrefix(`/api/v1/auth`)
      - traefik.http.routers.auth.priority=20
      - traefik.http.services.auth.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  wfs:
    build:
      context: ../..
      dockerfile: services/wfs/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
    volumes:
      - geosondata:/var/lib/geoson/data:ro
    depends_on:
      postgres: { condition: service_healthy }

  tiles:
    build:
      context: ../..
      dockerfile: services/tiles/Dockerfile
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
      GEOSON_REDIS_URL: redis:6379
      GEOSON_NATS_URL: nats://nats:4222
      GEOSON_WMS_URL: http://wms:8080
      GEOSON_TILE_CACHE_DIR: /var/cache/geoson/tiles
    volumes:
      - tilecache:/var/cache/geoson/tiles
    labels:
      - traefik.enable=true
      - traefik.http.routers.tiles.rule=PathPrefix(`/tiles`)
      - traefik.http.routers.tiles.priority=5
      - traefik.http.services.tiles.loadbalancer.server.port=8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }

  wps:
    build:
      context: ../..
      dockerfile: services/wps/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_DATABASE_URL: postgres://${POSTGRES_USER:-geoson}:${POSTGRES_PASSWORD:-geoson-dev-password}@postgres:5432/${POSTGRES_DB:-geoson}
      GEOSON_NATS_URL: nats://nats:4222
      GEOSON_WPS_RESULTS_DIR: /var/lib/geoson/wps
    volumes:
      - wpsresults:/var/lib/geoson/wps
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  convert:
    build:
      context: ../..
      dockerfile: services/convert/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    environment:
      GEOSON_CATALOG_URL: http://catalog:8080
      GEOSON_DATA_DIR: /var/lib/geoson/data
    volumes:
      - geosondata:/var/lib/geoson/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.convert.rule=PathPrefix(`/api/v1/convert`)
      - traefik.http.routers.convert.priority=15
      - traefik.http.services.convert.loadbalancer.server.port=8080
    depends_on:
      catalog: { condition: service_started }

  postgres:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geoson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoson-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-geoson}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-geoson}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-geoson-dev-password}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  miniodata:
  tilecache:
  wpsresults:
  geosondata:
