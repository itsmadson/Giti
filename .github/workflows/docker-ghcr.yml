name: Build & push images to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: gateway,  dockerfile: services/gateway/Dockerfile,  context: . }
          - { service: catalog,  dockerfile: services/catalog/Dockerfile,  context: . }
          - { service: auth,     dockerfile: services/auth/Dockerfile,     context: . }
          - { service: wms,      dockerfile: services/wms/Dockerfile,      context: . }
          - { service: wfs,      dockerfile: services/wfs/Dockerfile,      context: . }
          - { service: tiles,    dockerfile: services/tiles/Dockerfile,    context: . }
          - { service: wps,      dockerfile: services/wps/Dockerfile,      context: . }
          - { service: convert,  dockerfile: services/convert/Dockerfile,  context: . }
          - { service: frontend, dockerfile: frontend/Dockerfile,          context: frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: lc
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lc.outputs.owner }}/giti-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
