name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: giti
          POSTGRES_PASSWORD: giti
          POSTGRES_DB: giti_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U giti" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      GITI_TEST_DATABASE_URL: postgres://giti:giti@localhost:5433/giti_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet github.com/giti/giti/...
      - run: go test github.com/giti/giti/...

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f deploy/compose/docker-compose.yml config -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f services/gateway/Dockerfile .
      - run: docker build -f services/wms/Dockerfile .
      - run: docker build -f services/catalog/Dockerfile .
      - run: docker build -f services/auth/Dockerfile .
      - run: docker build -f services/wfs/Dockerfile .
      - run: docker build -f services/tiles/Dockerfile .
      - run: docker build -f services/wps/Dockerfile .
      - run: docker build -f services/convert/Dockerfile .
      - run: docker build -f frontend/Dockerfile frontend
